name: Flutter + FastAPI CI/CD Pipeline

on:
  push:
    branches: [ main, develop, Copy_test ]
  pull_request:
    branches: [ main ]

jobs:
  # ─────────────────────────────
  # BACKEND - FastAPI
  # ─────────────────────────────
  backend-test:
    name: FastAPI Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        working-directory: ./backend
        env:
          SENTRY_DSN: ${{ secrets.SENTRY_DSN_BACKEND }}        # ← CHANGED
        run: |
          pytest . -v --ignore=notes.db || true

      - name: Lint with flake8
        working-directory: ./backend
        run: |
          pip install flake8
          flake8 . --max-line-length=120 --ignore=E302,W291,W292,W293,E501 || true

  # ─────────────────────────────
  # FRONTEND - Flutter
  # ─────────────────────────────
  flutter-test:
    name: Flutter Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze --no-fatal-infos

      - name: Run unit tests
        run: flutter test || true

  # ─────────────────────────────
  # BUILD Flutter Web
  # ─────────────────────────────
  flutter-build-web:
    name: Build Flutter Web
    runs-on: ubuntu-latest
    needs: flutter-test

    steps:
      - uses: actions/checkout@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build Web
        run: flutter build web --release --dart-define=SENTRY_DSN_FLUTTER=${{ secrets.SENTRY_DSN_FLUTTER }}   # ← CHANGED

      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-web-build
          path: build/web/

  # ─────────────────────────────
  # BUILD Flutter Android APK
  # ─────────────────────────────
  flutter-build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    needs: flutter-test

    steps:
      - uses: actions/checkout@v3

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Build APK
        run: flutter build apk --release --dart-define=SENTRY_DSN_FLUTTER=${{ secrets.SENTRY_DSN_FLUTTER }} || true   # ← CHANGED

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  # ─────────────────────────────
  # DEPLOY (only on main branch)
  # ─────────────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [backend-test, flutter-build-web]
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v3

      - name: Download web build
        uses: actions/download-artifact@v4
        with:
          name: flutter-web-build
          path: build/web

      - name: Deploy Backend to server
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SERVER_IP: ${{ secrets.SERVER_IP }}
          SENTRY_DSN_BACKEND: ${{ secrets.SENTRY_DSN_BACKEND }}      # ← CHANGED
          SENTRY_DSN_FLUTTER: ${{ secrets.SENTRY_DSN_FLUTTER }}      # ← CHANGED
        run: |
          echo "Add your deploy commands here"
          # Example: rsync, SSH, Docker push, etc.